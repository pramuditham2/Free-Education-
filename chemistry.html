<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Units | Science Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1D4ED8', secondary: '#9333EA', darkBg: '#0F172A', cardBg: 'rgba(30, 41, 59, 0.7)' },
                    fontFamily: { sans: ['Outfit', 'sans-serif'], sinhala: ['Noto Sans Sinhala', 'sans-serif'] }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab-btn.active {
            background: rgba(168, 85, 247, 0.2);
            color: #c084fc;
            border-left-color: #c084fc;
        }
    </style>
</head>

<body class="bg-darkBg text-white font-sans antialiased overflow-x-hidden pt-24">
    <!-- Ambient Lighting -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div
            class="absolute top-[10%] left-[-10%] w-[40%] h-[40%] bg-purple-600 rounded-full blur-[200px] opacity-20 animate-pulse-slow">
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 glass-nav transition-all duration-300 py-4 glass-nav scrolled" id="navbar">
        <div class="container mx-auto px-6 lg:px-12 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold flex items-center gap-2">
                <i class="ph-fill ph-atom text-primary text-3xl"></i> Science<span class="text-primary">Hub</span>
            </a>
            <div class="hidden md:flex space-x-8 text-sm font-semibold text-gray-300">
                <a href="index.html" class="hover:text-white transition-colors">Home</a>
                <a href="classes.html" class="hover:text-white transition-colors">Live Classes</a>
                <a href="resources.html" class="hover:text-white transition-colors">Library</a>
                <a href="dashboard.html" class="hover:text-white transition-colors">Dashboard</a>
            </div>
            <a href="dashboard.html"
                class="hidden md:block bg-gradient-to-r from-primary to-secondary px-6 py-2.5 rounded-full font-semibold hover:scale-105 transition-transform shadow-lg shadow-primary/30 text-white flex items-center gap-2">
                Join Free <i class="ph-bold ph-sign-in"></i>
            </a>
        </div>
    </nav>

    <div class="container mx-auto px-6 lg:px-12 pb-24">

        <!-- Header -->
        <div class="flex flex-col md:flex-row items-center gap-6 mb-12 fade-up">
            <div
                class="w-24 h-24 rounded-3xl bg-purple-500/20 flex items-center justify-center border border-purple-500/30 shadow-[0_0_30px_rgba(168,85,247,0.3)] shrink-0">
                <i class="ph-fill ph-flask text-5xl text-purple-400"></i>
            </div>
            <div>
                <h1 class="text-4xl md:text-5xl font-bold font-sinhala drop-shadow-lg mb-2">රසායන විද්‍යාව (Chemistry)
                </h1>
                <p class="text-purple-400 font-semibold mb-3 flex items-center gap-2 font-sinhala text-lg">
                    <i class="ph-fill ph-chalkboard-teacher text-xl"></i> මෙහෙයවීම: Dr. රන්ධීර් කරුණානායක
                </p>
                <p class="text-gray-400 text-lg">Select a unit from below to access dedicated video lessons, PDFs, and
                    past papers.</p>
            </div>
        </div>

        <div class="grid lg:grid-cols-4 gap-8 fade-up">

            <!-- Sidebar Tabs (Units 1 to 14ish - condensed to 10 for consistency) -->
            <aside class="lg:col-span-1">
                <div class="glass-card rounded-2xl border border-gray-800 p-2 sticky top-32">
                    <h3
                        class="text-sm font-bold text-gray-400 uppercase tracking-widest px-4 py-3 mb-2 border-b border-gray-800 flex items-center gap-2">
                        <i class="ph-bold ph-list-numbers"></i> All Units
                    </h3>
                    <div class="flex flex-col gap-1" id="tab-container">
                        <!-- JS will populate tabs here to avoid repetition in HTML -->
                    </div>
                </div>
            </aside>

            <!-- Main Content Area for Selected Unit -->
            <main class="lg:col-span-3 min-h-[500px]" id="content-container">
                <!-- JS will generate content here mapped to the active tab -->
            </main>
        </div>

    </div>

    <!-- Data & Script -->
    <script>
        // Data for Units (Focusing on major divisions)
        const units = [
            { id: 1, title: 'පරමාණුවක ව්‍යුහය (Atomic Structure)', notes: 20, videos: 12, pdf: 'pdfs/unit1_note.pdf', video: 'https://youtube.com/watch?v=your_video_id', past_papers: 'pdfs/unit1_papers.pdf', mind_map: 'pdfs/unit1_mindmap.pdf' },
            { id: 2, title: 'රසායනික බන්ධන (Chemical Bonding)', notes: 25, videos: 15, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            {
                id: 3, title: 'රසායනික ගණනය කිරීම් (Calculations)', notes: 40, videos: 5, pdf: 'pdfs/unit3_note.pdf', video: '#', past_papers: 'pdfs/unit3_papers.pdf', mind_map: 'pdfs/unit3_mindmap.pdf',
                playlist: [
                    { title: "Video 1 (Part 1)", url: "https://www.youtube.com/live/HltmdEhCY9M?si=nZlqmS0Hr4b9LZp1" },
                    { title: "Video 1 (Part 2)", url: "https://youtube.com/live/fhn_Jt_7iIQ?feature=share" },
                    { title: "Video 2", url: "https://youtube.com/live/Ni4CXbansWw?feature=share" },
                    { title: "Video 3", url: "https://youtube.com/live/Z3eUv0AMgFQ?feature=share" },
                    { title: "Video 4", url: "https://youtube.com/live/5mSYLJqm_S0?feature=share" }
                ]
            },
            { id: 4, title: 'වායු (Gases)', notes: 15, videos: 8, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            { id: 5, title: 'ශක්ති විද්‍යාව (Energetics)', notes: 22, videos: 14, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            { id: 6, title: 'අකාබනික රසායනය (Inorganic Chemistry)', notes: 35, videos: 20, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            { id: 7, title: 'කාබනික රසායනය I (Organic Chemistry 1)', notes: 20, videos: 15, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            { id: 8, title: 'කාබනික රසායනය II (Organic Chemistry 2)', notes: 25, videos: 20, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            { id: 9, title: 'කාබනික රසායනය III (Organic Chemistry 3)', notes: 30, videos: 25, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            { id: 10, title: 'චාලක රසායනය (Kinetics)', notes: 24, videos: 16, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            { id: 11, title: 'සමතුලිතතාව (Equilibrium)', notes: 38, videos: 28, pdf: '#', video: '#', past_papers: '#', mind_map: '#' },
            { id: 12, title: 'පරිසර රසායනය (Environmental Chemistry)', notes: 15, videos: 10, pdf: '#', video: '#', past_papers: '#', mind_map: '#' }
        ];


        const tabContainer = document.getElementById('tab-container');
        const contentContainer = document.getElementById('content-container');

        function selectUnit(unitId) {
            // Update Tab classes
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${unitId}`).classList.add('active');

            // Update Content classes
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`content-${unitId}`).classList.add('active');
        }

        // Generate HTML for Tabs and Contents
        units.forEach((unit, index) => {
            // Create Tab
            const tabBtn = document.createElement('button');
            tabBtn.id = `tab-${unit.id}`;
            tabBtn.className = `tab-btn w-full text-left px-4 py-3 rounded-xl border-l-4 border-transparent hover:bg-white/5 font-semibold transition-all flex items-center justify-between group ${index === 0 ? 'active' : ''}`;
            tabBtn.onclick = () => selectUnit(unit.id);
            tabBtn.innerHTML = `
                <span class="font-sinhala text-sm truncate pr-2"><span class="text-purple-500 font-bold mr-2">U${unit.id}</span> ${unit.title}</span>
                <i class="ph-bold ph-caret-right text-gray-500 group-hover:text-white transition-colors"></i>
            `;
            tabContainer.appendChild(tabBtn);

            // Create Content Array
            const contentDiv = document.createElement('div');
            contentDiv.id = `content-${unit.id}`;
            contentDiv.className = `tab-content ${index === 0 ? 'active' : ''}`;

            // Handle multi-video playlists or single video
            let videoHTML = '';
            if (unit.playlist && unit.playlist.length > 0) {
                videoHTML = unit.playlist.map((vid, i) => `
                    <a href="${vid.url}" target="_blank" class="glass-card p-5 rounded-xl border border-gray-700 hover:border-purple-500 transition-colors flex gap-4 group cursor-pointer block">
                        <div class="w-12 h-12 rounded-lg bg-blue-500/10 flex items-center justify-center shrink-0">
                            <i class="ph-fill ph-play-circle text-blue-500 text-2xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <div>
                            <h5 class="font-bold text-sm mb-1 font-sinhala">${vid.title}</h5>
                            <p class="text-xs text-gray-400">Videos • Click to watch</p>
                        </div>
                    </a>
                `).join('');
            } else {
                videoHTML = `
                    <a href="${unit.video}" target="_blank" class="glass-card p-5 rounded-xl border border-gray-700 hover:border-purple-500 transition-colors flex gap-4 group cursor-pointer block">
                        <div class="w-12 h-12 rounded-lg bg-blue-500/10 flex items-center justify-center shrink-0">
                            <i class="ph-fill ph-play-circle text-blue-500 text-2xl group-hover:scale-110 transition-transform"></i>
                        </div>
                        <div>
                            <h5 class="font-bold text-sm mb-1 font-sinhala">න්‍යාය වීඩියෝ මාලාව (Theory)</h5>
                            <p class="text-xs text-gray-400">Videos • Click to watch</p>
                        </div>
                    </a>
                `;
            }

            // Dummy content generated per unit
            contentDiv.innerHTML = `
                <div class="glass-card p-8 rounded-3xl border border-purple-500/20 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-purple-500/10 rounded-full blur-[80px] pointer-events-none"></div>
                    
                    <h2 class="text-sm font-bold text-purple-400 tracking-widest uppercase mb-2">Unit 0${unit.id}</h2>
                    <h3 class="text-3xl lg:text-4xl font-bold font-sinhala mb-6">${unit.title}</h3>
                    
                    <p class="text-gray-400 mb-8 max-w-2xl leading-relaxed">
                        Access all curated resources specific to Unit ${unit.id}. Includes highly detailed short notes, comprehensive video tutorials, and categorized past paper questions including complex organic/inorganic structures.
                    </p>

                    <div class="flex gap-6 mb-10 border-b border-gray-800 pb-8">
                        <div><div class="text-3xl font-bold text-white">${unit.videos}</div><div class="text-sm text-gray-400">Video Lessons</div></div>
                        <div><div class="text-3xl font-bold text-white">${unit.notes}</div><div class="text-sm text-gray-400">PDF Documents</div></div>
                    </div>

                    <!-- Resources Grid inside the Unit -->
                    <h4 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="ph-bold ph-folder-open text-purple-400"></i> Course Materials</h4>
                    <div class="grid md:grid-cols-2 gap-4">
                        
                        <a href="${unit.pdf}" target="_blank" class="glass-card p-5 rounded-xl border border-gray-700 hover:border-purple-500 transition-colors flex gap-4 group cursor-pointer block">
                            <div class="w-12 h-12 rounded-lg bg-red-500/10 flex items-center justify-center shrink-0">
                                <i class="ph-fill ph-file-pdf text-red-500 text-2xl group-hover:scale-110 transition-transform"></i>
                            </div>
                            <div>
                                <h5 class="font-bold text-sm mb-1 font-sinhala">සම්පූර්ණ සටහන (Full Note)</h5>
                                <p class="text-xs text-gray-400">PDF • Click to open</p>
                            </div>
                        </a>

                        ${videoHTML}

                        <a href="${unit.past_papers}" target="_blank" class="glass-card p-5 rounded-xl border border-gray-700 hover:border-purple-500 transition-colors flex gap-4 group cursor-pointer block">
                            <div class="w-12 h-12 rounded-lg bg-yellow-500/10 flex items-center justify-center shrink-0">
                                <i class="ph-fill ph-exam text-yellow-500 text-2xl group-hover:scale-110 transition-transform"></i>
                            </div>
                            <div>
                                <h5 class="font-bold text-sm mb-1 font-sinhala">පසුගිය ප්‍රශ්න (Past Papers)</h5>
                                <p class="text-xs text-gray-400">PDF • Click to download</p>
                            </div>
                        </a>

                        <a href="${unit.mind_map}" target="_blank" class="glass-card p-5 rounded-xl border border-gray-700 hover:border-purple-500 transition-colors flex gap-4 group cursor-pointer block">
                            <div class="w-12 h-12 rounded-lg bg-purple-500/10 flex items-center justify-center shrink-0">
                                <i class="ph-fill ph-git-branch text-purple-500 text-2xl group-hover:scale-110 transition-transform"></i>
                            </div>
                            <div>
                                <h5 class="font-bold text-sm mb-1 font-sinhala">කෙටි සටහන් (Mind Maps)</h5>
                                <p class="text-xs text-gray-400">PDF • Click to view</p>
                            </div>
                        </a>

                    </div>
                </div>
            `;
            contentContainer.appendChild(contentDiv);
        });
    </script>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.from('.fade-up', { y: 30, opacity: 0, duration: 1, stagger: 0.2 });
    </script>
</body>

</html><!DOCTYPE html>
