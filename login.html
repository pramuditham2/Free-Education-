<!DOCTYPE html>
<html lang="si">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | Science Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1D4ED8', secondary: '#9333EA', darkBg: '#0F172A', cardBg: 'rgba(30, 41, 59, 0.7)' },
                    fontFamily: { sans: ['Outfit', 'sans-serif'], sinhala: ['Noto Sans Sinhala', 'sans-serif'] }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&family=Outfit:wght@300;400;600;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body
    class="bg-darkBg text-white font-sans antialiased overflow-hidden h-screen flex items-center justify-center relative">

    <!-- Ambient Lighting -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div
            class="absolute top-[10%] left-[60%] w-[40%] h-[40%] bg-secondary rounded-full blur-[150px] opacity-30 animate-pulse-slow">
        </div>
        <div
            class="absolute bottom-[-10%] right-[10%] w-[40%] h-[40%] bg-primary rounded-full blur-[150px] opacity-30 animate-pulse-slow delay-1000">
        </div>
    </div>

    <div class="w-full max-w-md px-6 fade-up">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="index.html"
                class="text-3xl font-bold flex flex-col items-center justify-center gap-2 tracking-wide mx-auto">
                <i class="ph-fill ph-atom text-primary text-5xl drop-shadow-[0_0_15px_rgba(29,78,216,0.6)] mb-2"></i>
                <div>Science<span class="text-primary">Hub</span></div>
            </a>
            <p class="text-gray-400 mt-3 font-sinhala">ඔබගේ ගිණුමට පිවිසෙන්න</p>
        </div>

        <!-- Login Form -->
        <div class="glass-card p-8 rounded-3xl border border-gray-800 shadow-2xl relative">
            <h2 class="text-2xl font-bold mb-6 font-sinhala">ලොග් වන්න (Login)</h2>

            <form id="loginForm" class="space-y-5">

                <div>
                    <label class="block text-sm font-semibold text-gray-400 mb-2 font-sinhala">විද්‍යුත් තැපෑල (Email
                        Address)</label>
                    <div class="relative">
                        <i
                            class="ph-bold ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                        <input type="email" id="email" required placeholder="you@example.com"
                            class="w-full bg-slate-900/50 border border-gray-700 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-400 mb-2 font-sinhala">මුරපදය (Password)</label>
                    <div class="relative">
                        <i class="ph-bold ph-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                        <input type="password" id="password" required placeholder="••••••••"
                            class="w-full bg-slate-900/50 border border-gray-700 rounded-xl py-3 pl-12 pr-4 text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                    </div>
                </div>

                <div class="flex justify-end">
                    <a href="#" class="text-xs text-primary hover:text-blue-400 transition-colors font-sinhala">මුරපදය
                        අමතකද?</a>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-primary to-secondary text-white font-bold py-3.5 rounded-xl hover:scale-[1.02] hover:shadow-[0_0_20px_rgba(29,78,216,0.4)] transition-all flex items-center justify-center gap-2 mt-2">
                    Sign In <i class="ph-bold ph-sign-in"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-gray-400 font-sinhala">
                ගිණුමක් නැද්ද? <a href="register.html"
                    class="text-primary hover:text-blue-400 font-semibold transition-colors underline-offset-4 hover:underline">ලියාපදිංචි
                    වන්න</a>
            </div>
        </div>
    </div>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.from('.fade-up', { y: 30, opacity: 0, duration: 0.8, ease: 'power2.out' });

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            // Just simulate login, name defaults to User if not registered in this session
            const name = localStorage.getItem('studentName') || 'කසුන්';
            window.location.href = 'dashboard.html';
        });
    </script>
</body>

</html>
